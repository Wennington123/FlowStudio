<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1050" width="1500" height="1050" font-family="Arial, Helvetica, sans-serif">

  <rect width="1500" height="1050" fill="#FFFFFF"/>
  <rect x="20" y="20" width="1460" height="1010" fill="none" stroke="#A9DDD4" stroke-width="2"/>

  <rect x="50" y="50" width="250" height="30" fill="#D9D9D9" rx="4"/>
  <text x="175" y="70" fill="#333" font-size="14" font-weight="bold" text-anchor="middle">Estudos prévios</text>

  <rect x="50" y="100" width="250" height="110" fill="#F2F2F2" rx="4"/>
  <text x="175" y="130" fill="#333" font-size="13" text-anchor="middle">Estudos incluídos em versões</text>
  <text x="175" y="150" fill="#333" font-size="13" text-anchor="middle">anteriores da revisão (n = {prev_est})</text>
  <text x="175" y="170" fill="#333" font-size="13" text-anchor="middle">Publicações de estudos</text>
  <text x="175" y="190" fill="#333" font-size="13" text-anchor="middle">incluídos (n = {prev_pub})</text>

  <rect x="330" y="50" width="600" height="50" fill="#009B89" rx="4"/>
  <text x="630" y="70" fill="#FFF" font-size="15" font-weight="bold" text-anchor="middle">Identificação de novos estudos</text>
  <text x="630" y="90" fill="#FFF" font-size="15" font-weight="bold" text-anchor="middle">via bases de dados e repositórios</text>

  <rect x="330" y="120" width="280" height="90" fill="#E8F3F1" rx="4"/>
  <text x="470" y="145" fill="#333" font-size="13" text-anchor="middle">Registros identificados de:</text>
  <text x="470" y="165" fill="#333" font-size="13" text-anchor="middle">Bases de dados (n = {db_db})</text>
  <text x="470" y="185" fill="#333" font-size="13" text-anchor="middle">Repositórios de registros (n = {db_reg})</text>

  <rect x="650" y="120" width="280" height="160" fill="#E8F3F1" rx="4"/>
  <text x="790" y="145" fill="#333" font-size="13" text-anchor="middle">Registros removidos</text>
  <text x="790" y="165" fill="#333" font-size="13" text-anchor="middle">antes da triagem:</text>
  <text x="790" y="185" fill="#333" font-size="13" text-anchor="middle">Duplicados removidos (n = {db_dup})</text>
  <text x="790" y="205" fill="#333" font-size="13" text-anchor="middle">Não elegíveis (automação) (n = {db_auto})</text>
  <text x="790" y="225" fill="#333" font-size="13" text-anchor="middle">Outros motivos (n = {db_outros})</text>

  <rect x="330" y="310" width="280" height="40" fill="#E8F3F1" rx="4"/>
  <text x="470" y="335" fill="#333" font-size="13" text-anchor="middle">Registros triados (n = {scr_triados})</text>

  <rect x="650" y="310" width="280" height="40" fill="#E8F3F1" rx="4"/>
  <text x="790" y="335" fill="#333" font-size="13" text-anchor="middle">Registros excluídos (n = {scr_exc})</text>

  <rect x="330" y="380" width="280" height="60" fill="#E8F3F1" rx="4"/>
  <text x="470" y="405" fill="#333" font-size="13" text-anchor="middle">Publicações</text>
  <text x="470" y="425" fill="#333" font-size="13" text-anchor="middle">recuperadas (n = {recup_recup})</text>

  <rect x="650" y="380" width="280" height="60" fill="#E8F3F1" rx="4"/>
  <text x="790" y="405" fill="#333" font-size="13" text-anchor="middle">Publicações não</text>
  <text x="790" y="425" fill="#333" font-size="13" text-anchor="middle">recuperadas (n = {recup_nao})</text>

  <rect x="330" y="470" width="280" height="60" fill="#E8F3F1" rx="4"/>
  <text x="470" y="495" fill="#333" font-size="13" text-anchor="middle">Publicações avaliadas</text>
  <text x="470" y="515" fill="#333" font-size="13" text-anchor="middle">para elegibilidade (n = {aval_aval})</text>

  <rect x="650" y="470" width="280" height="110" fill="#E8F3F1" rx="4"/>
  <text x="790" y="495" fill="#333" font-size="13" text-anchor="middle">Publicações excluídas:</text>
  <text x="790" y="515" fill="#333" font-size="13" text-anchor="middle">Motivo 1 (n = {aval_m1})</text>
  <text x="790" y="535" fill="#333" font-size="13" text-anchor="middle">Motivo 2 (n = {aval_m2})</text>
  <text x="790" y="555" fill="#333" font-size="13" text-anchor="middle">Motivo 3 (n = {aval_m3})</text>

  <rect x="330" y="630" width="280" height="90" fill="#E8F3F1" rx="4"/>
  <text x="470" y="655" fill="#333" font-size="13" text-anchor="middle">Novos estudos incluídos</text>
  <text x="470" y="675" fill="#333" font-size="13" text-anchor="middle">na revisão (n = {fin_novos_est})</text>
  <text x="470" y="695" fill="#333" font-size="13" text-anchor="middle">Publicações dos novos est. (n = {fin_novos_pub})</text>

  <rect x="330" y="750" width="280" height="90" fill="#F2F2F2" rx="4"/>
  <text x="470" y="775" fill="#333" font-size="13" text-anchor="middle" font-weight="bold">Total de estudos incluídos</text>
  <text x="470" y="795" fill="#333" font-size="13" text-anchor="middle">na revisão (n = {fin_tot_est})</text>
  <text x="470" y="815" fill="#333" font-size="13" text-anchor="middle">Publicações do total (n = {fin_tot_pub})</text>


  <rect x="960" y="50" width="500" height="50" fill="#D9D9D9" rx="4"/>
  <text x="1210" y="80" fill="#333" font-size="15" font-weight="bold" text-anchor="middle">Identificação de novos estudos por outros métodos</text>

  <rect x="960" y="120" width="500" height="110" fill="#F2F2F2" rx="4"/>
  <text x="1210" y="145" fill="#333" font-size="13" text-anchor="middle">Registros identificados em:</text>
  <text x="1210" y="165" fill="#333" font-size="13" text-anchor="middle">Sites (n = {oth_sites})</text>
  <text x="1210" y="185" fill="#333" font-size="13" text-anchor="middle">Organizações (n = {oth_org})</text>
  <text x="1210" y="205" fill="#333" font-size="13" text-anchor="middle">Buscas por citações (n = {oth_cit})</text>

  <rect x="960" y="380" width="230" height="60" fill="#F2F2F2" rx="4"/>
  <text x="1075" y="405" fill="#333" font-size="13" text-anchor="middle">Publicações</text>
  <text x="1075" y="425" fill="#333" font-size="13" text-anchor="middle">recuperadas (n = {oth_recup})</text>

  <rect x="1230" y="380" width="230" height="60" fill="#F2F2F2" rx="4"/>
  <text x="1345" y="405" fill="#333" font-size="13" text-anchor="middle">Publicações não</text>
  <text x="1345" y="425" fill="#333" font-size="13" text-anchor="middle">recuperadas (n = {oth_nao})</text>

  <rect x="960" y="470" width="230" height="60" fill="#F2F2F2" rx="4"/>
  <text x="1075" y="495" fill="#333" font-size="13" text-anchor="middle">Publicações avaliadas</text>
  <text x="1075" y="515" fill="#333" font-size="13" text-anchor="middle">para elegibilidade (n = {oth_aval})</text>

  <rect x="1230" y="470" width="230" height="110" fill="#F2F2F2" rx="4"/>
  <text x="1345" y="495" fill="#333" font-size="13" text-anchor="middle">Publicações excluídas:</text>
  <text x="1345" y="515" fill="#333" font-size="13" text-anchor="middle">Motivo 1 (n = {oth_m1})</text>
  <text x="1345" y="535" fill="#333" font-size="13" text-anchor="middle">Motivo 2 (n = {oth_m2})</text>
  <text x="1345" y="555" fill="#333" font-size="13" text-anchor="middle">Motivo 3 (n = {oth_m3})</text>


